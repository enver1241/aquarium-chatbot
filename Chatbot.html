<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chatbot Interface</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      margin: 0;
      background-color: #f5f5f5;
    }

    .sidebar {
      width: 300px;
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      overflow-y: auto;
    }

    .sidebar h2 {
      margin-top: 0;
    }

    .sidebar button {
      width: 100%;
      padding: 10px;
      margin-bottom: 20px;
      background-color: #3498db;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    .sidebar button:hover {
      background-color: #2980b9;
    }

    .sidebar ul {
      list-style-type: none;
      padding: 0;
    }

    .sidebar li {
      margin-bottom: 10px;
      cursor: pointer;
      background-color: #34495e;
      padding: 10px;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .sidebar li:hover {
      background-color: #3d5a73;
    }

    .answer {
      display: none;
      margin-top: 5px;
      font-size: 14px;
      color: #bdc3c7;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
    }

    #chatlog {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
    }

    #chatlog p {
      margin: 5px 0;
    }

    .input-area {
      display: flex;
      margin-top: 10px;
    }

    #userInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .input-area button {
      padding: 10px 20px;
      margin-left: 10px;
      font-size: 16px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .input-area button:hover {
      background-color: #1e8449;
    }

    .logout-btn {
      margin-top: 20px;
      background-color: #e74c3c;
    }

    .logout-btn:hover {
      background-color: #c0392b;
    }
  </style>
</head>
<body>

  <div class="sidebar">
    <button onclick="startNewChat()">+ New Chat</button>
    <h2>Asked Questions</h2>
    <ul id="questions"></ul>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <div class="main">
    <div id="chatlog"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type a message..." onkeydown="if(event.key === 'Enter') sendMessage()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
  window.onload = function () {
    // ✅ Giriş kontrolü burada düzgün çalışır
    const user = localStorage.getItem("user");
    const pass = localStorage.getItem("pass");

    if (!user || !pass) {
      alert("Lütfen giriş yapın!");
      window.location.href = "login.html";
    }
  };

  function logout() {
    localStorage.removeItem("user");
    localStorage.removeItem("pass");
    alert("Çıkış yapıldı.");
    window.location.href = "login.html";
  }

  async function sendMessage() {
    const userInput = document.getElementById('userInput');
    const chatlog = document.getElementById('chatlog');
    const questionList = document.getElementById('questions');
    const message = userInput.value.trim();

    if (!message) return;

    chatlog.innerHTML += `<p><strong>You:</strong> ${message}</p>`;

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      const botReply = data.reply || "Sorry, I couldn't get a reply.";

      chatlog.innerHTML += `<p><strong>Bot:</strong> ${botReply}</p>`;

      const li = document.createElement('li');
      li.innerHTML = `${message}
        <div class="answer">${botReply}</div>`;

      li.addEventListener('click', function () {
        const answer = this.querySelector('.answer');
        answer.style.display = (answer.style.display === 'block') ? 'none' : 'block';
        document.getElementById('userInput').value = message;
        document.getElementById('userInput').focus();
      });

      questionList.appendChild(li);
    } catch (error) {
      chatlog.innerHTML += `<p><strong>Bot:</strong> Server unavailable!</p>`;
      console.error("❌ Hata:", error);
    }

    userInput.value = "";
    chatlog.scrollTop = chatlog.scrollHeight;
  }

  function startNewChat() {
    const chatlog = document.getElementById('chatlog');
    const questionList = document.getElementById('questions');

    if (confirm("Are you sure you want to start a new chat?")) {
      chatlog.innerHTML = "";
      questionList.innerHTML = "";
    }
  }
</script>
