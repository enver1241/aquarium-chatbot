<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <style>
    body { font-family: Arial, sans-serif; background: #e3f2fd; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .login-box { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
    h2 { margin-bottom: 20px; color: #0077b6; }
    label { display:block; text-align:left; margin-bottom:8px; font-weight:600; color:#333; }
    input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
    button { background-color: #0077b6; color: #fff; padding: 12px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; width: 100%; }
    button:hover { background-color: #005f86; }
    .muted { margin-top: 10px; color:#666; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>🔐 Admin Login</h2>
    <form id="adminLoginForm" method="POST" action="/login" novalidate>
      <input type="hidden" name="username" value="admin" />
      <label for="adminPass">Admin Password</label>
      <input type="password" id="adminPass" name="password" placeholder="Enter Admin Password" required />
      <button type="submit">Login</button>
      <p class="muted">İpucu: Parola, sunucudaki <code>ADMIN_PASSWORD</code> (yoksa <code>admin123</code>).</p>
    </form>
  </div>
  <script src="/script.js?v=1" defer></script>
</body>
</html>
<script src="/script.js?v=1" defer></script>
