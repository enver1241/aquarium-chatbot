<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f0f4f8; margin: 0; padding: 0;
      display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .feedback-container { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 100%; max-width: 500px; }
    h2 { margin-bottom: 20px; color: #333; text-align: center; }
    form { display: flex; flex-direction: column; gap: 15px; }
    label { font-weight: 600; font-size: 14px; color: #444; }
    input, textarea { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; width: 100%; }
    textarea { resize: vertical; min-height: 100px; }
    button { background: #0077ff; color: white; padding: 12px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
    button:hover { background: #005fcc; }
  </style>
</head>
<body>
  <div class="feedback-container">
    <h2>📣 Send us your Feedback</h2>
    <form id="feedbackForm" method="POST" action="/feedback">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name">
      <label for="email">Your Email</label>
      <input type="email" id="email" name="email">
      <label for="message">Message / Issue</label>
      <textarea id="message" name="message" required></textarea>
      <button type="submit">Send</button>
    </form>
  </div>
  <script src="/script.js?v=1" defer></script>
</body>
</html>
